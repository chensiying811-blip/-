<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 拼豆画板</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      text-align: center;
      padding: 30px;
    }

    .toolbar {
      margin: 20px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .board-wrap {
      width: 100%;
      overflow: auto;
    }

    .board {
      display: grid;
      justify-content: center;
      gap: 1px;
      margin: 20px auto;
    }

    .cell {
      background: white;
      border-radius: 50%;
      border: 1px solid #d1d5db;
      cursor: pointer;
      transition: 0.1s;
      box-sizing: border-box;
    }

    .cell:hover {
      transform: scale(1.2);
      border-color: #2563eb;
    }

    button, select {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button {
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    select {
      background: white;
      border: 1px solid #d1d5db;
    }

    input[type="color"] {
      width: 50px;
      height: 40px;
      border: none;
      cursor: pointer;
    }

    .tip {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

    function getCellDisplaySize() {
      return gridSize === 64 ? 10 : 18;
    }

    function getPrintCellSize() {
      return gridSize === 64 ? 24 : 42;
    }

    function rgbToCss(rgb) {
      return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
    }

    function getBeadCode(bead) {
      return `${bead.mard}/${bead.coco}`;
    }

    function findNearestBeadColor(r, g, b) {
      let nearest = beadPalette[0];
      let minDistance = Infinity;

      beadPalette.forEach(bead => {
        const [br, bg, bb] = bead.rgb;

        const distance =
          Math.pow(r - br, 2) +
          Math.pow(g - bg, 2) +
          Math.pow(b - bb, 2);

        if (distance < minDistance) {
          minDistance = distance;
          nearest = bead;
        }
      });

      return nearest;
    }

    function hexToRgbString(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    function createBoard() {
      board.innerHTML = "";

      const cellSize = getCellDisplaySize();

      board.style.gridTemplateColumns = `repeat(${gridSize}, ${cellSize}px)`;
      board.style.gridTemplateRows = `repeat(${gridSize}, ${cellSize}px)`;

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        cell.style.width = cellSize + "px";
        cell.style.height = cellSize + "px";

        cell.dataset.code = "";
        cell.dataset.name = "";
        cell.dataset.rgb = "255,255,255";

        cell.onclick = function () {
          cell.style.backgroundColor = colorPicker.value;
          cell.dataset.code = "自选";
          cell.dataset.name = "Custom 自选颜色";
          cell.dataset.rgb = hexToRgbString(colorPicker.value);
        };

        board.appendChild(cell);
      }
    }

    function changeGridSize() {
      gridSize = Number(gridSizeSelect.value);
      totalCells = gridSize * gridSize;
      createBoard();
    }

    function clearBoard() {
      const cells = document.querySelectorAll(".cell");

      cells.forEach(cell => {
        cell.style.backgroundColor = "white";
        cell.dataset.code = "";
        cell.dataset.name = "";
        cell.dataset.rgb = "255,255,255";
      });
    }

    imageUpload.addEventListener("change", function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const img = new Image();
      img.src = URL.createObjectURL(file);

      img.onload = function () {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = gridSize;
        canvas.height = gridSize;

        ctx.drawImage(img, 0, 0, gridSize, gridSize);

        const cells = document.querySelectorAll(".cell");

        for (let y = 0; y < gridSize; y++) {
          for (let x = 0; x < gridSize; x++) {
            const pixel = ctx.getImageData(x, y, 1, 1).data;

            const r = pixel[0];
            const g = pixel[1];
            const b = pixel[2];
            const a = pixel[3];

            const index = y * gridSize + x;

            if (a === 0) {
              cells[index].style.backgroundColor = "white";
              cells[index].dataset.code = "";
              cells[index].dataset.name = "";
              cells[index].dataset.rgb = "255,255,255";
            } else {
              const bead = findNearestBeadColor(r, g, b);

              cells[index].style.backgroundColor = rgbToCss(bead.rgb);
              cells[index].dataset.code = getBeadCode(bead);
              cells[index].dataset.name = bead.name;
              cells[index].dataset.rgb = bead.rgb.join(",");
            }
          }
        }

        URL.revokeObjectURL(img.src);
      };
    });

    function exportPattern() {
      const cells = document.querySelectorAll(".cell");

      const printCellSize = getPrintCellSize();
      const patternSize = gridSize * printCellSize;
      const legendHeight = 700;

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = patternSize;
      canvas.height = patternSize + legendHeight;

      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const colorStats = {};

      cells.forEach((cell, index) => {
        const code = cell.dataset.code;
        const name = cell.dataset.name;
        const rgbText = cell.dataset.rgb || "255,255,255";
        const [r, g, b] = rgbText.split(",").map(Number);

        const isEmpty = !code || (r === 255 && g === 255 && b === 255);

        if (!isEmpty) {
          if (!colorStats[code]) {
            colorStats[code] = {
              name: name,
              rgb: [r, g, b],
              count: 0
            };
          }
          colorStats[code].count++;
        }

        const x = index % gridSize;
        const y = Math.floor(index / gridSize);

        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(
          x * printCellSize,
          y * printCellSize,
          printCellSize,
          printCellSize
        );

        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1;
        ctx.strokeRect(
          x * printCellSize,
          y * printCellSize,
          printCellSize,
          printCellSize
        );

        if (!isEmpty) {
          ctx.fillStyle = "#000";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          if (gridSize === 64) {
            ctx.font = "bold 7px Arial";
          } else {
            ctx.font = "bold 11px Arial";
          }

          ctx.fillText(
            code,
            x * printCellSize + printCellSize / 2,
            y * printCellSize + printCellSize / 2
          );
        }
      });

      let startY = patternSize + 40;

      ctx.fillStyle = "#000";
      ctx.font = "bold 28px Arial";
      ctx.textAlign = "left";
      ctx.fillText(`拼豆色号统计 MARD / COCO（${gridSize}×${gridSize}）`, 20, startY);

      startY += 45;

      Object.keys(colorStats).forEach(code => {
        const item = colorStats[code];
        const [r, g, b] = item.rgb;

        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(20, startY - 24, 32, 32);

        ctx.strokeStyle = "#333";
        ctx.strokeRect(20, startY - 24, 32, 32);

        ctx.fillStyle = "#000";
        ctx.font = "18px Arial";
        ctx.fillText(`${code}  ${item.name}：${item.count} 颗`, 65, startY);

        startY += 34;
      });

      const link = document.createElement("a");
      link.download = `MARD_COCO拼豆打印图纸_${gridSize}x${gridSize}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    createBoard();
  </script>
</body>
</html>
